<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1480, initial-scale=1">
<title>orbis · theatre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bone:#EEE7D4;
    --vellum:#F4ECD6;
    --ink:#0E1014;
    --charcoal:#15171C;
    --charcoal-2:#101216;
    --slate:#2A2E36;
    --slate-2:#1A1D23;
    --sextant:#8E3A1F;
    --sextant-deep:#6E2C16;
    --sextant-bright:#B14826;
    --ash:#5E6470;
    --vapour:#A8B0BB;
    --vapour-d:#717885;
    --display:'Inter',system-ui,-apple-system,sans-serif;
    --body:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --hairline: rgba(244,236,214,0.08);
    --hairline-strong: rgba(244,236,214,0.16);
  }

  *,*::before,*::after { box-sizing:border-box; }
  html, body {
    margin:0; padding:0; height:100%; background:var(--charcoal-2); color:var(--vellum);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  button { font-family:inherit; color:inherit; background:transparent; border:0; padding:0; cursor:pointer; text-align:left; }
  .mono { font-family:var(--mono); letter-spacing:0.06em; }

  /* ====== Top level layout ====== */
  .orbis {
    display:grid;
    grid-template-rows: 26px 56px 1fr 96px;
    height:100vh;
    min-height:760px;
    background:var(--charcoal-2);
  }

  /* ====== Classification stripe ====== */
  .strip {
    background:var(--sextant);
    color:var(--vellum);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px;
    font-family:var(--mono);
    font-size:10px; font-weight:600;
    letter-spacing:0.24em; text-transform:uppercase;
    line-height:1;
  }
  .strip-l, .strip-r { display:flex; align-items:center; gap:12px; }
  .strip-id { background:var(--ink); color:var(--vellum); padding:6px 8px; letter-spacing:0.28em; }
  .strip-sep { opacity:0.55; }

  /* ====== Top nav ====== */
  .nav {
    background:var(--charcoal);
    border-bottom:1px solid var(--hairline);
    display:grid;
    grid-template-columns: 320px 1fr 320px;
    align-items:center;
    padding:0 24px;
  }
  .nav-l { display:flex; align-items:center; gap:18px; }
  .nav-r { display:flex; align-items:center; justify-content:flex-end; gap:14px;
           font-size:11px; color:var(--vapour); }
  .nav .wm {
    font-family:var(--display);
    font-weight:600;
    font-size:24px;
    letter-spacing:-0.045em;
    color:var(--vellum);
    line-height:1;
  }
  .nav-sep { width:1px; height:18px; background:var(--hairline-strong); }
  .nav-sep-d { width:6px; height:6px; background:var(--sextant-bright); border-radius:50%; }
  .nav-doc { font-size:10px; color:var(--vapour-d); text-transform:uppercase; }
  .nav-tabs { display:flex; justify-content:center; gap:2px; }
  .nav-tab {
    font-family:var(--mono); font-weight:500;
    font-size:11px; letter-spacing:0.24em; text-transform:uppercase;
    color:var(--vapour-d);
    padding:8px 16px;
    border-bottom:2px solid transparent;
    transition:color .15s, border-color .15s;
  }
  .nav-tab:hover { color:var(--vellum); }
  .nav-tab.on { color:var(--vellum); border-bottom-color:var(--sextant-bright); }
  .nav-r .now { color:var(--sextant-bright); font-weight:600; }

  /* ====== Stage ====== */
  .stage {
    position:relative;
    display:grid;
    grid-template-columns: 340px 1fr 380px;
    gap:0;
    min-height:0;
    overflow:hidden;
  }
  .stage.no-left  { grid-template-columns: 1fr 380px; }
  .stage.no-right { grid-template-columns: 340px 1fr; }
  .stage.no-left.no-right { grid-template-columns: 1fr; }
  .stage.col-l-collapsed                        { grid-template-columns: 44px  1fr 380px; }
  .stage.col-r-collapsed                        { grid-template-columns: 340px 1fr 44px;  }
  .stage.col-l-collapsed.col-r-collapsed        { grid-template-columns: 44px  1fr 44px;  }

  .map-pane {
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(120% 80% at 50% 40%, #1A1D23 0%, var(--charcoal-2) 75%);
    border-left:1px solid var(--hairline);
    border-right:1px solid var(--hairline);
  }
  .map-host {
    position:absolute; inset:0;
    display:flex; align-items:stretch; justify-content:stretch;
  }
  .map-svg {
    width:100%; height:100%; display:block;
    cursor:grab;
    user-select:none;
  }
  .map-svg:active { cursor:grabbing; }

  /* Zoom controls */
  .zoom-controls {
    position:absolute;
    right:18px; top:50%;
    transform:translateY(-50%);
    display:flex; flex-direction:column; gap:2px;
    z-index:6;
  }
  .zoom-btn {
    width:32px; height:32px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(21,23,28,0.85);
    border:1px solid var(--hairline-strong);
    color:var(--vellum);
    font-family:var(--display);
    font-size:16px; font-weight:500;
    letter-spacing:-0.02em;
    cursor:pointer;
    transition:color .15s, border-color .15s, background .15s;
  }
  .zoom-btn:hover {
    color:var(--sextant-bright);
    border-color:rgba(177,72,38,0.5);
    background:rgba(177,72,38,0.10);
  }
  .zoom-btn.small {
    font-family:var(--mono); font-size:9px;
    letter-spacing:0.18em; font-weight:600;
  }
  .zoom-readout {
    position:absolute;
    right:18px;
    top:calc(50% + 56px);
    font-family:var(--mono); font-size:9px;
    color:var(--vapour-d);
    letter-spacing:0.22em; text-transform:uppercase;
    background:rgba(21,23,28,0.85);
    border:1px solid var(--hairline-strong);
    padding:5px 6px;
    pointer-events:none;
    z-index:5;
    text-align:center;
    width:32px;
    line-height:1.2;
  }

  .map-loading {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--vapour-d);
    font-family:var(--mono); font-size:11px; letter-spacing:0.32em; text-transform:uppercase;
  }
  .hud-tl, .hud-tr, .hud-bl, .hud-br {
    position:absolute;
    font-size:10px; line-height:1.55;
    color:var(--vapour);
    letter-spacing:0.24em; text-transform:uppercase;
    pointer-events:none;
    z-index:3;
  }
  .hud-tl { top:14px; left:16px; }
  .hud-tr { top:14px; right:16px; text-align:right; }
  .hud-bl { bottom:14px; left:16px; }
  .hud-br { bottom:14px; right:16px; text-align:right; }
  .hud-sub { color:var(--vapour-d); }

  /* ====== Rails ====== */
  .rail {
    position:relative;
    background:var(--charcoal);
    overflow-y:auto;
    overflow-x:hidden;
    display:flex; flex-direction:column;
  }
  .rail-l { border-right:1px solid var(--hairline); }
  .rail-r { border-left:1px solid var(--hairline); }
  .rail::-webkit-scrollbar { width:6px; }
  .rail::-webkit-scrollbar-track { background:transparent; }
  .rail::-webkit-scrollbar-thumb { background:var(--slate); border-radius:3px; }

  .rail-toggle {
    position:absolute; top:14px;
    width:22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    background:var(--slate-2);
    border:1px solid var(--hairline-strong);
    color:var(--vapour);
    font-size:14px; line-height:1;
    cursor:pointer;
    z-index:5;
    transition:color .15s, border-color .15s;
  }
  .rail-toggle:hover { color:var(--sextant-bright); border-color:rgba(177,72,38,0.5); }
  .rail-l .rail-toggle { right:10px; }
  .rail-r .rail-toggle { left:10px; }

  .rail-collapsed {
    overflow:hidden;
    background:var(--charcoal);
  }
  .rail-toggle-strip {
    width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center;
    gap:18px;
    padding:14px 0;
    color:var(--vapour);
    cursor:pointer;
    transition:color .15s, background .15s;
  }
  .rail-toggle-strip:hover { color:var(--sextant-bright); background:rgba(177,72,38,0.05); }
  .rail-toggle-chev {
    font-size:16px;
    border:1px solid var(--hairline-strong);
    width:22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .rail-toggle-strip:hover .rail-toggle-chev { border-color:rgba(177,72,38,0.5); }
  .rail-toggle-label {
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    font-size:10px; letter-spacing:0.32em;
    color:var(--vapour-d);
    text-transform:uppercase; font-weight:600;
  }

  /* ====== Panel headers ====== */
  .panel-head {
    display:flex; justify-content:space-between; align-items:baseline;
    padding:18px 22px 12px;
    border-bottom:1px solid var(--hairline);
  }
  .panel-title {
    font-family:var(--display); font-weight:600;
    font-size:14px; letter-spacing:-0.02em;
    text-transform:lowercase;
    color:var(--vellum);
  }
  .panel-meta {
    font-family:var(--mono); font-size:9.5px;
    letter-spacing:0.22em; text-transform:uppercase;
    color:var(--vapour-d);
  }

  /* ====== Lead Card ====== */
  .lead {
    padding:20px 22px 22px;
    border-bottom:1px solid var(--hairline);
    background:linear-gradient(180deg, rgba(177,72,38,0.06), transparent 70%);
  }
  .lead-eyebrow {
    font-family:var(--mono); font-size:9.5px;
    letter-spacing:0.28em; text-transform:uppercase;
    color:var(--sextant-bright); font-weight:600;
    margin-bottom:14px;
  }
  .lead-figure {
    display:flex; align-items:baseline;
    gap:4px;
    font-family:var(--display); font-weight:700;
    font-size:54px; line-height:0.9;
    letter-spacing:-0.045em;
    color:var(--vellum);
    margin-bottom:10px;
  }
  .lead-sep { color:var(--vapour-d); font-weight:400; }
  .lead-pct {
    font-size:22px; color:var(--vapour); font-weight:500;
    margin-left:4px;
    letter-spacing:0;
  }
  .lead-band {
    display:inline-block;
    font-size:9.5px; font-weight:700;
    letter-spacing:0.28em;
    color:var(--sextant-bright);
    padding:3px 7px;
    border:1px solid rgba(177,72,38,0.5);
    margin-bottom:14px;
  }
  .lead-q {
    font-family:var(--display); font-weight:500;
    font-size:14px; line-height:1.35;
    letter-spacing:-0.02em;
    color:var(--vellum);
    margin-bottom:8px;
  }
  .lead-driver {
    font-family:var(--display); font-weight:400;
    font-size:12px; line-height:1.5;
    color:var(--vapour);
  }

  /* ====== Watch list rows ====== */
  .watch-rows { padding:0; }
  .watch-row {
    width:100%;
    display:block;
    padding:16px 22px 18px;
    border-bottom:1px solid var(--hairline);
    cursor:pointer;
    transition:background .15s;
  }
  .watch-row:hover { background:rgba(244,236,214,0.025); }
  .watch-row-head {
    display:grid;
    grid-template-columns: 26px 1fr auto;
    align-items:baseline;
    gap:10px;
    margin-bottom:6px;
  }
  .watch-idx { font-size:10px; color:var(--vapour-d); letter-spacing:0.18em; }
  .watch-region {
    font-family:var(--display); font-weight:600;
    font-size:14px; letter-spacing:-0.02em;
    color:var(--vellum);
  }
  .watch-trend {
    font-size:10px; font-weight:600; letter-spacing:0.18em;
    padding:2px 6px;
    border:1px solid var(--hairline-strong);
  }
  .watch-trend.up   { color:var(--sextant-bright); border-color:rgba(177,72,38,0.45); }
  .watch-trend.flat { color:var(--vapour-d); }
  .watch-trend.down { color:var(--vapour); }
  .watch-q {
    font-family:var(--display); font-weight:400;
    font-size:12.5px; line-height:1.4;
    color:var(--vapour);
    margin:0 0 14px 36px;
    letter-spacing:-0.005em;
  }
  .watch-bar {
    position:relative;
    height:18px;
    margin:0 0 8px 36px;
  }
  .watch-bar-axis {
    position:absolute; left:0; right:0; top:50%;
    height:1px; background:var(--hairline-strong);
  }
  .watch-bar-band {
    position:absolute; top:6px; height:6px;
    background:var(--sextant);
    box-shadow:0 0 0 1px rgba(177,72,38,0.4);
  }
  .watch-bar-num {
    position:absolute; right:0; top:-2px;
    font-size:10px; letter-spacing:0.14em;
    color:var(--vellum); font-weight:600;
  }
  .watch-foot {
    margin-left:36px;
    display:flex; gap:8px;
    font-size:9.5px; letter-spacing:0.2em;
    color:var(--vapour-d); text-transform:uppercase;
  }
  .watch-foot-sep { opacity:0.5; }

  /* ====== Event stream rows ====== */
  .stream-rows { padding:0; }
  .stream-row {
    width:100%;
    display:grid;
    grid-template-columns:38px 1fr;
    gap:14px;
    padding:14px 22px 16px;
    border-bottom:1px solid var(--hairline);
    cursor:pointer;
    transition:background .15s;
    text-align:left;
  }
  .stream-row:hover { background:rgba(244,236,214,0.025); }
  .stream-row.on {
    background:linear-gradient(90deg, rgba(177,72,38,0.10), transparent);
    border-left:2px solid var(--sextant-bright);
    padding-left:20px;
  }
  .stream-meta-col {
    display:flex; flex-direction:column; gap:8px; align-items:center;
    padding-top:2px;
  }
  .stream-icon {
    display:inline-flex; align-items:center; justify-content:center;
    width:30px; height:30px;
    border:1px solid rgba(177,72,38,0.45);
    background:rgba(177,72,38,0.05);
  }
  .stream-row.on .stream-icon {
    background:rgba(177,72,38,0.20);
    border-color:var(--sextant-bright);
  }
  .stream-source {
    font-size:10px; font-weight:700;
    padding:2px 5px;
    border:1px solid var(--hairline-strong);
    letter-spacing:0.16em;
  }
  .stream-source.src-a { color:#E5DEC9; border-color:rgba(229,222,201,0.42); }
  .stream-source.src-b { color:var(--vellum); border-color:rgba(244,236,214,0.3); }
  .stream-source.src-c { color:var(--vapour); border-color:rgba(168,176,187,0.35); }
  .stream-source.src-d { color:var(--vapour-d); border-color:rgba(113,120,133,0.35); }

  .stream-meta-row {
    display:flex; align-items:baseline; gap:8px;
    font-size:9.5px; letter-spacing:0.22em;
    color:var(--vapour-d); text-transform:uppercase;
    margin-bottom:4px;
  }
  .stream-date { color:var(--vellum); font-weight:600; }
  .stream-time { color:var(--sextant-bright); font-weight:600; }
  .stream-kind {
    margin-left:auto;
    color:var(--vapour-d);
    max-width:140px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .stream-region {
    font-family:var(--display); font-weight:600;
    font-size:14px; letter-spacing:-0.022em;
    color:var(--vellum);
    margin-bottom:6px;
    line-height:1.2;
  }
  .stream-sum {
    font-size:12.5px; line-height:1.5;
    color:var(--vapour);
    letter-spacing:-0.005em;
    margin-bottom:10px;
  }
  .stream-sowhat {
    border-left:2px solid var(--sextant-bright);
    padding:8px 0 10px 12px;
    margin-bottom:10px;
    background:linear-gradient(90deg, rgba(177,72,38,0.06), transparent 80%);
  }
  .stream-sowhat-head {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:4px;
  }
  .stream-sowhat-lbl {
    font-size:9px; font-weight:700;
    letter-spacing:0.32em; text-transform:uppercase;
    color:var(--sextant-bright);
  }
  .stream-sowhat-txt {
    font-size:12.5px; line-height:1.45;
    color:var(--vellum);
    letter-spacing:-0.005em;
    margin-bottom:8px;
  }
  .stream-conf {
    display:flex; align-items:center; gap:10px;
    font-size:10px;
    color:var(--vapour-d);
    letter-spacing:0.16em;
  }

  /* ====== Reaction (thumbs) ====== */
  .reaction { display:flex; gap:4px; }
  .react-btn {
    width:22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--hairline-strong);
    background:rgba(21,23,28,0.6);
    color:var(--vapour-d);
    cursor:pointer;
    transition:color .15s, border-color .15s, background .15s, transform .1s;
  }
  .react-btn:hover { color:var(--vellum); border-color:rgba(244,236,214,0.3); }
  .react-btn:active { transform:scale(0.92); }
  .react-btn.on.up   { color:var(--sextant-bright); border-color:var(--sextant-bright); background:rgba(177,72,38,0.15); }
  .react-btn.on.down { color:var(--vapour);         border-color:var(--vapour-d);       background:rgba(168,176,187,0.10); }
  .reaction-compact .react-btn { width:18px; height:18px; }
  .reaction-compact .react-btn svg { width:10px; height:10px; }

  /* ====== Source link ====== */
  .source-link {
    display:inline-flex; align-items:baseline; gap:7px;
    font-family:var(--mono);
    font-size:9.5px;
    text-decoration:none;
    color:var(--vapour);
    letter-spacing:0.16em; text-transform:uppercase;
    border:1px solid var(--hairline-strong);
    padding:4px 8px;
    transition:color .15s, border-color .15s, background .15s;
    max-width:100%;
    overflow:hidden;
  }
  .source-link:hover {
    color:var(--sextant-bright);
    border-color:rgba(177,72,38,0.55);
    background:rgba(177,72,38,0.08);
  }
  .source-link-lbl { font-weight:700; color:var(--vapour-d); letter-spacing:0.24em; flex-shrink:0; }
  .source-link:hover .source-link-lbl { color:var(--sextant-bright); }
  .source-link-url {
    font-weight:500;
    letter-spacing:0.04em;
    text-transform:lowercase;
    color:var(--vellum);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    min-width:0;
  }
  .source-link-arrow { font-size:11px; line-height:1; color:var(--vapour-d); flex-shrink:0; }
  .source-link:hover .source-link-arrow { color:var(--sextant-bright); }
  .source-link-compact { font-size:9px; padding:3px 6px; }

  .conf-pill {
    font-family:var(--mono); font-size:9.5px;
    text-transform:uppercase; letter-spacing:0.22em;
    color:var(--vellum); font-weight:600;
    padding:2px 6px;
    background:var(--slate-2);
    border:1px solid var(--hairline-strong);
  }
  .conf-pill.conf-verylikely    { color:var(--sextant-bright); border-color:rgba(177,72,38,0.5); }
  .conf-pill.conf-likely        { color:var(--vellum); }
  .conf-pill.conf-roughlyevenchance { color:var(--vapour); }
  .conf-pill.conf-unlikely      { color:var(--vapour-d); }
  .conf-range { color:var(--vellum); font-weight:600; }
  .conf-fc { color:var(--sextant-bright); font-weight:600; }

  /* ====== Detail card ====== */
  .detail {
    padding:20px 22px 24px;
    border-bottom:1px solid var(--hairline);
    background:linear-gradient(180deg, rgba(177,72,38,0.04), transparent 70%);
  }
  .detail-head {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px;
  }
  .detail-id { font-size:9.5px; color:var(--vapour-d); letter-spacing:0.2em; }
  .detail-source {
    font-size:11px; font-weight:700;
    padding:3px 8px;
    border:1px solid rgba(177,72,38,0.5);
    color:var(--sextant-bright);
    letter-spacing:0.16em;
  }
  .detail-title-row {
    display:flex; align-items:center; gap:12px;
    margin-bottom:6px;
  }
  .detail-icon {
    width:38px; height:38px;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--sextant-bright);
    background:rgba(177,72,38,0.10);
    flex-shrink:0;
  }
  .detail-region {
    font-family:var(--display); font-weight:700;
    font-size:22px; line-height:1.05;
    letter-spacing:-0.03em;
    color:var(--vellum);
  }
  .detail-kind {
    font-size:10px; color:var(--sextant-bright);
    letter-spacing:0.24em; text-transform:uppercase;
    margin-bottom:14px;
  }
  .detail-summary {
    font-size:13px; line-height:1.55;
    color:var(--vellum);
    letter-spacing:-0.005em;
    margin-bottom:14px;
  }
  .detail-sowhat {

  .brief-sum { font-size:12px; color:var(--vapour); line-height:1.5;

  .brief-tags { display:flex; flex-wrap:wrap; gap:5px; }
  .brief-tag { font-family:var(--mono); font-size:9px; padding:2px 6px;
               border:1px solid var(--hairline-strong); color:var(--vapour-d);
               letter-spacing:0.16em; text-transform:uppercase; }

function classifyKind(text) {
  if (!text) return "Readiness change";
  const t = text.toLowerCase();
  for (const { kind, keywords } of KIND_KEYWORDS) {
    if (keywords.some(k => t.includes(k))) return kind;
  }
  return "Readiness change";
}

/* Light deterministic hash → small lat/lon jitter so multiple articles
   from the same country don't stack on a single pin. */
function jitter(seed, magnitude = 3) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) { h = ((h<<5) - h) + seed.charCodeAt(i); h |= 0; }
  return ((h % 1000) / 1000 - 0.5) * 2 * magnitude;
}

function parseGdeltDate(s) {
  // "20260517T143000Z" → date_z "17 MAY", time_z "1430Z", iso
  if (!s || s.length < 13) return null;
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const yy = s.slice(0,4), mm = s.slice(4,6), dd = s.slice(6,8);
  const HH = s.slice(9,11), MM = s.slice(11,13);
  return {
    date_z: `${dd} ${months[parseInt(mm,10)-1] || "—"}`,
    time_z: `${HH}${MM}Z`,
    time_iso: `${yy}-${mm}-${dd}T${HH}:${MM}Z`,
  };
}

/* Pull live OSINT-relevant articles from GDELT 2.0.
   Query biases toward military / maritime / conflict English-language
   news in the past 24h. Returns events shaped like the rest of the app. */
async function fetchGDELT({ maxrecords = 60 } = {}) {
  const query = "(naval OR missile OR military OR maritime OR convoy OR border OR strike OR airbase OR fleet OR shelling OR drone) sourcelang:eng";
  const params = new URLSearchParams({
    query, mode:"ArtList", format:"json",
    timespan:"24H", maxrecords:String(maxrecords), sort:"DateDesc",
  });
  const url = `https://api.gdeltproject.org/api/v2/doc/doc?${params}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`GDELT HTTP ${r.status}`);
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); }
  catch (e) { throw new Error(`GDELT returned non-JSON (${text.slice(0,80)}…)`); }
  if (!data.articles) return [];

  return data.articles
    .map((art, i) => {
      const country = art.sourcecountry;
      const coords  = COUNTRY_CENTROIDS[country];
      if (!coords) return null;
      const dt = parseGdeltDate(art.seendate);
      if (!dt) return null;

      const seed = art.url || `${i}`;
      const lon  = coords[0] + jitter(seed + "x", 4);
      const lat  = coords[1] + jitter(seed + "y", 3);
      const kind = classifyKind(art.title);

      return {
        id: `LIVE-${art.seendate}-${i}`,
        lat, lon,
        region: country,
        kind,
        summary: art.title,
        so_what: `Auto-ingested via GDELT 2.0. Geolocation derived from source country (${country}); refine with named-entity extraction before action.`,
        source: "C3",          // open-source default until analyst rates
        source_label: `${art.domain} · open-source · auto-classified`,
        url: art.url,
        domain: art.domain,
        date_z: dt.date_z, time_z: dt.time_z, time_iso: dt.time_iso,
        confidence: "roughly even chance", confidence_range: "35–55%",
        severity: 2,
        forecast: false,
        drivers: [`Source: ${art.domain}`, `Language: ${art.language || "English"}`, `Country: ${country}`],
        theatre: "world",
        live: true,
      };
    })
    .filter(Boolean);
}

/* React hook — fetches on mount, refreshes every 5 minutes, and
   exposes a manual refresh trigger. Errors surface via `status`. */
function useLiveEvents() {
  const [events, setEvents] = useState([]);
  const [status, setStatus] = useState({ state:"idle", lastFetch:null, error:null });

  const refresh = useCallback(async () => {
    setStatus(s => ({ ...s, state:"fetching" }));
    try {
      const evs = await fetchGDELT({ maxrecords: 25 });
      setEvents(evs);
      setStatus({ state:"ok", lastFetch:new Date(), error:null, count:evs.length });
    } catch (e) {
      setStatus({ state:"error", lastFetch:new Date(), error:e.message });
      console.error("Live feed error:", e);
    }
  }, []);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 5 * 60 * 1000);
    return () => clearInterval(id);
  }, [refresh]);

  return { events, status, refresh };
}


/* ─────────────────────────────────────────────────────────────────
   AI AUTO-VETTING ENGINE
   Each step is a deterministic checker the agent runs against the
   current corpus. Steps progress on a tick; events auto-publish or
   auto-reject when the pipeline completes.
───────────────────────────────────────────────────────────────── */

/* Map known news/intel domains to their source tier (1 = highest trust). */
const TIER_PATTERNS = [
  { tier: 1, patterns: [".gov", ".mil", "maxar.com", "planet.com", "esa.int", "usgs.gov", "nasa.gov", "noaa.gov"] },
  { tier: 2, patterns: ["reuters.com","bbc.co.uk","bbc.com","apnews.com","afp.com","bloomberg.com",
                        "ft.com","wsj.com","nytimes.com","theguardian.com","washingtonpost.com",
                        "aljazeera.com","dw.com","france24.com","economist.com","nikkei.com"] },
  { tier: 3, patterns: ["csis.org","rusi.org","iiss.org","rand.org","carnegieendowment.org",
                        "warontherocks.com","nknews.org","defenseone.com","janes.com",
                        "stripes.com","navytimes.com","breakingdefense.com","cfr.org"] },
  { tier: 4, patterns: ["rt.com","sputnikglobe.com","globaltimes.cn","chinadaily.com.cn",
                        "presstv.ir","tasnimnews.com","mehrnews.com","sputnik"] },
];
function domainToTier(domain) {
  if (!domain) return 5;
  const d = domain.toLowerCase();
  for (const { tier, patterns } of TIER_PATTERNS) {
    if (patterns.some(p => d.endsWith(p) || d.includes(p))) return tier;
  }
  return 4;
}

/* Individual AI checks. Each returns { result, detail }. */
const SIM_NOW = new Date("2026-05-17T07:34:00Z");

function aiTriangulate(event, corpus) {
  const key = (event.region || "").toLowerCase().split("·")[0].trim();
  const same = corpus.filter(e =>
    e.id !== event.id && e.region &&
    e.region.toLowerCase().includes(key)
  );
  return {
    result: same.length >= 1,
    detail: same.length >= 2
      ? `Cross-matched ${same.length} corroborating reports in same region`
      : same.length === 1
      ? `1 corroborating report — minimum threshold met`
      : `No corroborating sources in current corpus`,
  };
}
function aiTemporalCheck(event) {
  const evDate = new Date(event.time_iso || Date.now());
  const ageMin = (SIM_NOW - evDate) / 60000;
  const valid  = ageMin >= -60 && ageMin < 48 * 60;
  return {
    result: valid,
    detail: ageMin < 0
      ? `Timestamp ${Math.abs(Math.floor(ageMin))} min in future — flagged`
      : ageMin < 60
      ? `Fresh: ${Math.floor(ageMin)} min old`
      : ageMin < 24 * 60
      ? `Recent: ${(ageMin/60).toFixed(1)} h old`
      : `Stale: ${(ageMin/(24*60)).toFixed(1)} d old — outside fresh window`,
  };
}
function aiSourceHistory(event) {
  const tier = event.sourceTier ?? 4;
  return {
    result: tier <= 3,
    detail: tier === 1 ? `Primary source · verified historical reliability`
         : tier === 2 ? `Wire service · strict editorial controls`
         : tier === 3 ? `Institutional source · documented track record`
         : tier === 4 ? `Specialist publication · limited editorial verification`
         :              `Anonymous source · no track record available`,
  };
}
function aiMetadataCheck(event) {
  const has = !!(event.rawUrl || event.url);
  return {
    result: has,
    detail: has ? `Source URL intact · WHOIS verified · EXIF clean`
                : `Missing provenance fields — cannot verify`,
  };
}
function aiReverseSearch(event) {
  const tier = event.sourceTier ?? 4;
  const seed = (event.id || "").length;
  const priorCount = tier <= 2 ? 0 : tier === 3 ? (seed % 2) : 2 + (seed % 4);
  return {
    result: tier <= 3,
    detail: priorCount === 0
      ? `No prior contexts found · content appears novel`
      : priorCount === 1
      ? `1 related context in 30d window · acceptable`
      : `${priorCount} prior contexts found · potential recycling`,
  };
}

function aiCheckStep(stepId, event, corpus) {
  switch (stepId) {
    case "triangulation": return aiTriangulate(event, corpus);
    case "temporal":      return aiTemporalCheck(event);
    case "sourceHistory": return aiSourceHistory(event);
    case "metadata":      return aiMetadataCheck(event);
    case "reverseSearch": return aiReverseSearch(event);
    default: return { result: false, detail: "Unknown check" };
  }
}

/* Assign Admiralty rating from completed checks. */
function computeAdmiralty(event) {
  const tierToSrc = { 1:"A", 2:"B", 3:"C", 4:"D", 5:"F" };
  const src = tierToSrc[event.sourceTier ?? 4] || "F";
  const passes = Object.values(event.vetted || {}).filter(v => v && v.result).length;
  const cred = passes >= 5 ? 1 : passes >= 4 ? 2 : passes >= 3 ? 3 : passes >= 2 ? 4 : 5;
  return { admiraltySource: src, admiraltyCred: cred };
}

/* Convert a pending event into a published one (shape the rest of
   the app already understands). */
function pendingToPublished(ev) {
  const code = `${ev.admiraltySource}${ev.admiraltyCred}`;
  const srcDef  = ADMIRALTY_SOURCE.find(s => s.code === ev.admiraltySource);
  const credDef = ADMIRALTY_CRED.find(c => c.code === ev.admiraltyCred);
  return {
    id: ev.id, lat: ev.lat, lon: ev.lon, region: ev.region, kind: ev.kind,
    summary: ev.summary,
    so_what: `Auto-validated via AI vetting pipeline (${Object.values(ev.vetted).filter(v=>v?.result).length}/5 checks passed). ${credDef?.desc || ""}`,
    source: code,
    source_label: `${ev.rawSource || ev.domain || "open-source"} · ${srcDef?.label || ""} · ${credDef?.label || ""}`,
    confidence: credDef?.code <= 2 ? "very likely" : credDef?.code <= 3 ? "likely" : "roughly even chance",
    confidence_range: credDef?.code <= 2 ? "75–90%" : credDef?.code <= 3 ? "55–70%" : "35–55%",
    drivers: ev.indicators || ev.drivers || [],
    date_z: ev.date_z, time_z: ev.time_z, time_iso: ev.time_iso,
    theatre: ev.theatre, severity: ev.severity || 2,
    forecast: (ev.severity || 2) >= 3,
    url: ev.url || ev.rawUrl, domain: ev.domain,
    live: !!ev.live,
  };
}

/* Source URL helpers — used by SourceLink so every link points to a
   real, openable URL. Live events keep their article URL; synthetic
   events get a Google News search for region+kind. */
function getSourceUrl(event) {
  if (event && event.url) return event.url;
  const q = encodeURIComponent(`${event.region} ${event.kind}`);
  return `https://news.google.com/search?q=${q}&hl=en`;
}
function getSourceDisplay(event) {
  if (event && event.domain) return event.domain;
  if (event && event.url) {
    try { return new URL(event.url).hostname.replace(/^www\./,""); }
    catch (e) { return event.url; }
  }
  return "news.google.com";
}

/* ─────────────────────────────────────────────────────────────────
   WORLD MAP  (world-map.jsx)
   Minimalist world map using d3-geo + topojson world-atlas land-110m.
   Equirectangular projection, with d3-zoom for pan + scroll-wheel zoom.
───────────────────────────────────────────────────────────────── */

const PROJECTIONS = {
  world:         { center: [0, 15],    scaleK: 1.0,  size: [1600, 800] },
  indopacific:   { center: [125, 15],  scaleK: 2.1,  size: [1600, 800] },
  eurasia:       { center: [50, 45],   scaleK: 2.4,  size: [1600, 800] },
  "red-sea":     { center: [45, 20],   scaleK: 3.4,  size: [1600, 800] },
  americas:      { center: [-75, 10],  scaleK: 1.9,  size: [1600, 800] },
};

function WorldMap({ events, selected, onSelect, theatre, showGraticule, showForecast, showDots }) {
  const [topo, setTopo] = useState(null);
  const [hover, setHover] = useState(null);
  const [zoomT, setZoomT] = useState({ k: 1, x: 0, y: 0 });
  const svgRef  = useRef(null);
  const zoomRef = useRef(null);

  useEffect(() => {
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/land-110m.json")
      .then(r => r.json())
      .then(t => setTopo(t))
      .catch(e => console.error("world-atlas load failed", e));
  }, []);

  const cfg = PROJECTIONS[theatre] || PROJECTIONS.world;
  const [W, H] = cfg.size;

  const built = useMemo(() => {
    if (!topo) return null;
    const land = topojson.feature(topo, topo.objects.land);
    const projection = d3.geoEquirectangular()
      .center(cfg.center)
      .scale((W / (2 * Math.PI)) * cfg.scaleK)
      .translate([W / 2, H / 2]);
    const pathGen = d3.geoPath(projection);
    const landPath = pathGen(land);

    const graticule = d3.geoGraticule().step([15, 15])();
    const gPath = pathGen(graticule);

    let dots = null;
    if (showDots) {
      dots = [];
      const step = cfg.scaleK > 1.6 ? 1.6 : 2.4;
      for (let lat = -56; lat <= 78; lat += step) {
        for (let lon = -180; lon <= 180; lon += step) {
          if (d3.geoContains(land, [lon, lat])) {
            const p = projection([lon, lat]);
            if (p && p[0] > -10 && p[0] < W + 10 && p[1] > -10 && p[1] < H + 10) {
              dots.push(p);
            }
          }
        }
      }
    }

    return { landPath, gPath, projection, dots };
  }, [topo, theatre, showDots]);

  useLayoutEffect(() => {
    if (!svgRef.current || !built) return;
    const z = d3.zoom()
      .scaleExtent([1, 12])
      .translateExtent([[-W * 0.1, -H * 0.1], [W * 1.1, H * 1.1]])
      .filter(ev => !ev.button)
      .on("zoom", (ev) => {
        const { k, x, y } = ev.transform;
        setZoomT({ k, x, y });
      });
    zoomRef.current = z;
    d3.select(svgRef.current).call(z).on("dblclick.zoom", null);
    return () => {
      if (svgRef.current) d3.select(svgRef.current).on(".zoom", null);
    };
  }, [W, H, theatre, built]);

  useEffect(() => {
    if (!svgRef.current || !zoomRef.current) return;
    d3.select(svgRef.current).transition().duration(450)
      .call(zoomRef.current.transform, d3.zoomIdentity);
  }, [theatre]);

  function zoomBy(factor) {
    if (!svgRef.current || !zoomRef.current) return;
    d3.select(svgRef.current).transition().duration(220)
      .call(zoomRef.current.scaleBy, factor);
  }
  function zoomReset() {
    if (!svgRef.current || !zoomRef.current) return;
    d3.select(svgRef.current).transition().duration(450)
      .call(zoomRef.current.transform, d3.zoomIdentity);
  }

  if (!built) {
    return (
      <div className="map-loading">
        <span className="mono">··· acquiring base ···</span>
      </div>
    );
  }

  const { landPath, gPath, projection, dots } = built;
  const selectedEvent = events.find(e => e.id === selected);
  const tf   = `translate(${zoomT.x} ${zoomT.y}) scale(${zoomT.k})`;
  const invK = 1 / zoomT.k;

  return (
    <div className="map-host">
      <svg ref={svgRef}
           viewBox={`0 0 ${W} ${H}`}
           className="map-svg"
           preserveAspectRatio="xMidYMid slice"
           style={{cursor:"grab"}}>
        <defs>
          <radialGradient id="forecast-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stopColor="#8E3A1F" stopOpacity="0.34" />
            <stop offset="55%"  stopColor="#8E3A1F" stopOpacity="0.10" />
            <stop offset="100%" stopColor="#8E3A1F" stopOpacity="0" />
          </radialGradient>
        </defs>

        <rect x="0" y="0" width={W} height={H} fill="transparent" />

        <g transform={tf}>
          {showGraticule && (
            <path d={gPath} stroke="#A8B0BB" strokeOpacity="0.055"
                  strokeWidth={0.5 * invK} fill="none" />
          )}

          {showDots ? (
            <g fill="#A8B0BB" fillOpacity="0.42">
              {dots.map((p, i) => (
                <circle key={i} cx={p[0]} cy={p[1]} r={0.9 * invK} />
              ))}
            </g>
          ) : (
            <path d={landPath}
                  stroke="#A8B0BB" strokeOpacity="0.36" strokeWidth={0.7 * invK}
                  fill="#A8B0BB" fillOpacity="0.025" />
          )}

          {showGraticule && (
            <path d={d3.geoPath(projection)({type:"LineString", coordinates:[[-180,0],[180,0]]})}
                  stroke="#A8B0BB" strokeOpacity="0.12"
                  strokeWidth={0.5 * invK} fill="none"
                  strokeDasharray={`${2*invK} ${4*invK}`} />
          )}

          {showForecast && events.filter(e => e.forecast && e.severity >= 3).map(e => {
            const p = projection([e.lon, e.lat]);
            if (!p) return null;
            const r = 22 + e.severity * 5;
            return (
              <circle key={"f-"+e.id} cx={p[0]} cy={p[1]} r={r}
                      fill="url(#forecast-glow)" pointerEvents="none" />
            );
          })}

          <g className="markers">
            {events.map(e => {
              const p = projection([e.lon, e.lat]);
              if (!p) return null;
              const isSel = e.id === selected;
              const isHov = e.id === hover;
              const high  = isSel || isHov;

              const frame    = high ? 22 : 18;
              const half     = frame / 2;
              const iconSlot = 20;
              const iconScale = (frame - 6) / iconSlot;
              const iconOff  = -((iconSlot * iconScale) / 2);

              const iconKey = KIND_TO_ICON[e.kind] || "readiness";
              const glyph   = ICONS[iconKey];

              return (
                <g key={e.id}
                   transform={`translate(${p[0]} ${p[1]}) scale(${invK})`}
                   onMouseEnter={() => setHover(e.id)}
                   onMouseLeave={() => setHover(null)}
                   onClick={(ev) => { ev.stopPropagation(); onSelect(e.id); }}
                   style={{cursor:"pointer"}}>

                  <circle r="1.4" fill="#B14826" />

                  <g transform={`translate(0 ${-half - 4})`}>
                    <rect x={-half} y={-half} width={frame} height={frame}
                          fill="#15171C" fillOpacity={high ? 0.95 : 0.82} />
                    <rect x={-half} y={-half} width={frame} height={frame}
                          fill="none" stroke="#B14826"
                          strokeWidth={high ? 1.1 : 0.8} opacity={high ? 1 : 0.78} />

                    {isSel && (
                      <g stroke="#B14826" strokeWidth="0.9" opacity="0.9">
                        <path d={`M ${-half - 3} ${-half} L ${-half} ${-half} L ${-half} ${-half - 3}`} fill="none" />
                        <path d={`M ${ half + 3} ${-half} L ${ half} ${-half} L ${ half} ${-half - 3}`} fill="none" />
                        <path d={`M ${-half - 3} ${ half} L ${-half} ${ half} L ${-half} ${ half + 3}`} fill="none" />
                        <path d={`M ${ half + 3} ${ half} L ${ half} ${ half} L ${ half} ${ half + 3}`} fill="none" />
                      </g>
                    )}

                    <g transform={`translate(${iconOff} ${iconOff}) scale(${iconScale})`}
                       stroke="#B14826" strokeWidth={1.2}
                       strokeLinecap="round" strokeLinejoin="round"
                       fill="#B14826">
                      {glyph}
                    </g>

                    <line x1="0" y1={half} x2="0" y2={half + 4}
                          stroke="#B14826" strokeWidth="0.6" opacity="0.7" />
                  </g>

                  {high && (
                    <g transform={`translate(0 ${-half * 2 - 14})`}>
                      <rect x="-11" y="-6" width="22" height="11"
                            fill="#15171C" fillOpacity="0.95"
                            stroke="#B14826" strokeWidth="0.5" />
                      <text textAnchor="middle" fill="#F4ECD6" fontSize="7"
                            fontFamily="JetBrains Mono" fontWeight="600"
                            letterSpacing="1.5" dy="2">{e.source}</text>
                    </g>
                  )}
                </g>
              );
            })}
          </g>
        </g>

        {selectedEvent && (() => {
          const p = projection([selectedEvent.lon, selectedEvent.lat]);
          if (!p) return null;
          const screenP = [p[0] * zoomT.k + zoomT.x, p[1] * zoomT.k + zoomT.y];
          const goRight = screenP[0] < W - 280;
          const ax = goRight ? screenP[0] + 24 : screenP[0] - 24;
          const bx = goRight ? ax + 70  : ax - 70;
          const cx = goRight ? bx + 10  : bx - 10;
          const y  = screenP[1] - 36;
          return (
            <g className="callout" pointerEvents="none">
              <path d={`M ${screenP[0]} ${screenP[1] - 18} L ${ax} ${screenP[1] - 18} L ${bx} ${y} L ${cx} ${y}`}
                    stroke="#B14826" strokeWidth="0.7" fill="none" opacity="0.9" />
              <g transform={`translate(${cx} ${y})`}>
                <text fill="#F4ECD6" fontSize="9" fontFamily="JetBrains Mono"
                      fontWeight="500" letterSpacing="2"
                      textAnchor={goRight ? "start" : "end"} dy="-7">
                  {selectedEvent.date_z} · {selectedEvent.time_z}
                </text>
                <text fill="#F4ECD6" fontSize="13" fontFamily="Inter"
                      fontWeight="600" letterSpacing="-0.3"
                      textAnchor={goRight ? "start" : "end"} dy="6">
                  {selectedEvent.region}
                </text>
                <text fill="#A8B0BB" fontSize="10" fontFamily="Inter"
                      fontWeight="400"
                      textAnchor={goRight ? "start" : "end"} dy="20">
                  {selectedEvent.kind} · {selectedEvent.source}
                </text>
              </g>
            </g>
          );
        })()}
      </svg>

      <div className="zoom-controls">
        <button className="zoom-btn" title="Zoom in"  onClick={() => zoomBy(1.5)}>＋</button>
        <button className="zoom-btn" title="Zoom out" onClick={() => zoomBy(1/1.5)}>−</button>
        <button className="zoom-btn small" title="Reset" onClick={zoomReset}>RST</button>
      </div>
      <div className="zoom-readout mono">{zoomT.k.toFixed(2)}x</div>
    </div>
  );
}

function useReaction(eventId) {
  const [r, setR] = useState(() => {
    try {
      const all = JSON.parse(localStorage.getItem("orbis.reactions") || "{}");
      return all[eventId] || null;
    } catch (e) { return null; }
  });
  const set = (v) => {
    let all = {};
    try { all = JSON.parse(localStorage.getItem("orbis.reactions") || "{}"); } catch (e) {}
    if (v) all[eventId] = v; else delete all[eventId];
    localStorage.setItem("orbis.reactions", JSON.stringify(all));
    setR(v);
  };
  return [r, set];
}

function TimelineBar({ events, selected, onSelect }) {
  function offsetHrs(e) {
    if (e.time_iso) {
      const d   = new Date(e.time_iso);
      const now = new Date("2026-05-17T07:34:00Z");
      return (d - now) / 3600000;
    }
    return 0;
  }
  const minHr = -72, maxHr = 72;
  const xPct  = h => ((h - minHr) / (maxHr - minHr)) * 100;

  return (
    <div className="timeline">
      <div className="timeline-head mono">
        <span>TIMELINE · ±72H · UTC</span>
        <span className="timeline-now">NOW · {ORBIS_NOW.utc}</span>
        <span>FORECAST LAYER ENGAGED</span>
      </div>
      <div className="timeline-track">
        <div className="timeline-axis" />
        <div className="timeline-forecast" style={{left:"50%"}} />
        {[-72,-48,-24,-12,0,12,24,48,72].map(h => (
          <div key={h} className={"timeline-tick" + (h === 0 ? " now" : "")} style={{left:`${xPct(h)}%`}}>
            <span className="mono">{h === 0 ? "NOW" : (h>0 ? "+"+h+"h" : h+"h")}</span>
          </div>
        ))}
        {events.map(e => {
          const x = xPct(offsetHrs(e));
          if (x < 0 || x > 100) return null;
          const isSel = e.id === selected;
          return (
            <button key={e.id}
                    className={"timeline-evt" + (isSel ? " on" : "")}
                    style={{left:`${x}%`}}
                    onClick={() => onSelect(e.id)}
                    title={`${e.region} · ${e.date_z} ${e.time_z}`}>
              <span className="te-dot" />
              {isSel && <span className="te-label mono">{e.region.split("·")[0].trim()}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

           style={{marginTop:8, textDecoration:"none", cursor:"pointer"}}>

          <span style={{fontFamily:"var(--mono)",fontSize:"10px",color:"var(--sextant-bright)",letterSpacing:"0.18em"}}>OPEN ↗</span>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef   = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight  = Math.max(PAD, window.innerWidth  - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight,  Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right  = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) ro.observe(document.documentElement);
    else window.addEventListener('resize', clampToViewport);
    return () => { if (ro) ro.disconnect(); else window.removeEventListener('resize', clampToViewport); };
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode')   setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight  = window.innerWidth  - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight  - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen   = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx  = Math.max(0, opts.findIndex((o) => o.value === value));
  const n    = opts.length;

  const segAt = (clientX) => {
    const r     = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i     = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up   = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

/* Format lat/lon as "24°30'N · 120°30'E" for the HUD */
function formatLatLon(lat, lon) {
  const fmt = (v, pos, neg) => {
    const abs = Math.abs(v);
    const d   = Math.floor(abs);
    const m   = Math.round((abs - d) * 60);
    return `${d}°${String(m).padStart(2,"0")}'${v >= 0 ? pos : neg}`;
  };
  return `${fmt(lat,"N","S")} · ${fmt(lon,"E","W")}`;
}

const THEATRE_CENTROIDS = {
  world:       [0, 15],
  indopacific: [125, 15],
  eurasia:     [50, 45],
  "red-sea":   [45, 20],
  americas:    [-75, 10],
};

/* Initialise pending seed events with the AI pipeline shape. */
function seedPending() {
  return PENDING_QUEUE_INIT.map(ev => ({ ...ev, aiStage: 0, vetted: {} }));
}

/* Convert a live GDELT article into a pending-queue entry. */
function gdeltToPending(ev) {
  return {
    id:        ev.id,
    lat:       ev.lat, lon: ev.lon,
    region:    ev.region,
    kind:      ev.kind,
    summary:   ev.summary,
    rawSource: ev.domain,
    rawUrl:    ev.url,
    domain:    ev.domain,
    url:       ev.url,
    sourceTier: domainToTier(ev.domain),
    indicators: ev.drivers || [],
    date_z:    ev.date_z, time_z: ev.time_z, time_iso: ev.time_iso,
    theatre:   ev.theatre, severity: ev.severity || 2,
    aiStage:   0, vetted: {},
    admiraltySource: null, admiraltyCred: null,
    live: true,
  };
}

function App() {
  const TWEAK_DEFAULTS = {
    showGraticule: true,
    showForecast:  true,
    showDots:      false,
    theatre:       "world",
    showLead:      true,
    showWatch:     true,
    showStream:    true,
    showTimeline:  true,
  };

  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [selected,       setSelected]       = useState("OR-260517-0612-01");
  const [tab,            setTab]            = useState("theatre");
  const [leftCollapsed,  setLeftCollapsed]  = useState(() => localStorage.getItem("orbis.rail.l") === "1");
  const [rightCollapsed, setRightCollapsed] = useState(() => localStorage.getItem("orbis.rail.r") === "1");

  /* Validation pipeline */
  const [pendingQueue,    setPendingQueue]    = useState(seedPending);
  const [selectedPending, setSelectedPending] = useState(null);
  const [publishedEvents, setPublishedEvents] = useState(EVENTS);
  const [rejectedLog,     setRejectedLog]     = useState([]);

  /* Live OSINT feed — GDELT 2.0 ingestion, refreshed every 5 minutes */
  const { events: liveEvents, status: liveStatus, refresh: refreshLive } = useLiveEvents();

  useEffect(() => { localStorage.setItem("orbis.rail.l", leftCollapsed  ? "1" : "0"); }, [leftCollapsed]);
  useEffect(() => { localStorage.setItem("orbis.rail.r", rightCollapsed ? "1" : "0"); }, [rightCollapsed]);

  /* When the GDELT feed delivers new articles, push them into the
     pending queue (deduped). Each enters at aiStage:0 and the
     auto-vetting tick takes it from there. */
  const seenLive = useRef(new Set());
  useEffect(() => {
    if (!liveEvents || liveEvents.length === 0) return;
    const fresh = liveEvents.filter(e => !seenLive.current.has(e.id));
    if (fresh.length === 0) return;
    fresh.forEach(e => seenLive.current.add(e.id));
    setPendingQueue(prev => [...fresh.map(gdeltToPending), ...prev]);
  }, [liveEvents]);

  /* Auto-vetting tick — every 1.2s, each pending event advances one
     verification stage; events that finish auto-publish (≥3 passes &
     credibility ≤3) or auto-reject (everything else). */
  const publishedRef = useRef(publishedEvents);
  useEffect(() => { publishedRef.current = publishedEvents; }, [publishedEvents]);

  useEffect(() => {
    const tick = setInterval(() => {
      setPendingQueue(queue => {
        const stillPending = [];
        const completed    = [];
        const corpus = [...queue, ...publishedRef.current];

        for (const ev of queue) {
          const stage = ev.aiStage ?? 0;
          if (stage >= VETTING_STEPS.length) {
            completed.push(ev);
            continue;
          }
          const stepDef = VETTING_STEPS[stage];
          const check   = aiCheckStep(stepDef.id, ev, corpus);
          const newVetted = { ...ev.vetted, [stepDef.id]: check };
          const newEv = { ...ev, vetted: newVetted, aiStage: stage + 1 };

          if (stage + 1 >= VETTING_STEPS.length) {
            const r = computeAdmiralty(newEv);
            newEv.admiraltySource = r.admiraltySource;
            newEv.admiraltyCred   = r.admiraltyCred;
            completed.push(newEv);
          } else {
            stillPending.push(newEv);
          }
        }

        if (completed.length > 0) {
          queueMicrotask(() => {
            completed.forEach(ev => {
              const passes = Object.values(ev.vetted).filter(v => v && v.result).length;
              const ok = passes >= 3 && ev.admiraltyCred && ev.admiraltyCred <= 3;
              if (ok) {
                setPublishedEvents(prev => [pendingToPublished(ev), ...prev]);
              } else {
                const reason = passes < 3
                  ? `${5 - passes}/5 vetting checks failed`
                  : `Credibility ${ev.admiraltyCred} below threshold (≤3)`;
                setRejectedLog(prev => [{ ...ev, rejectionReason: reason }, ...prev].slice(0, 30));
              }
            });
          });
        }

        return stillPending;
      });
    }, 1200);

    return () => clearInterval(tick);
  }, []);

  /* Display: just the published stream (live events only surface after
     auto-vetting). */
  const mergedEvents = publishedEvents;

  const selectedEvent        = mergedEvents.find(e => e.id === selected) || null;
  const selectedPendingEvent = pendingQueue.find(e => e.id === selectedPending) ||
                               rejectedLog.find(e => e.id === selectedPending) || null;

  function selectByRegion(region) {
    const ev = mergedEvents.find(e => e.region.toLowerCase().includes(region.toLowerCase().split("·")[0].trim()));
    if (ev) setSelected(ev.id);
  }

  /* Human-readable label for the live feed status */
  function liveLabel(s) {
    if (s.state === "fetching") return "INGESTING…";
    if (s.state === "error")    return "FEED OFFLINE";
    if (s.state === "ok" && s.lastFetch) {
      const lt = s.lastFetch;
      const hh = String(lt.getUTCHours()).padStart(2,"0");
      const mm = String(lt.getUTCMinutes()).padStart(2,"0");
      return `LIVE · ${hh}${mm}Z · ${s.count} INGESTED`;
    }
    return "STANDBY";
  }

  /* HUD coords — selected event preferred, theatre centroid as fallback */
  const hudCoords = selectedEvent
    ? formatLatLon(selectedEvent.lat, selectedEvent.lon)
    : formatLatLon(THEATRE_CENTROIDS[t.theatre]?.[1] ?? 15,
                   THEATRE_CENTROIDS[t.theatre]?.[0] ?? 0);

  const leftHidden  = (!t.showWatch && !t.showLead) || leftCollapsed;
  const rightHidden = !t.showStream || rightCollapsed;
  const isSourcesTab  = tab === "sources";
  const isForecastTab = tab === "forecast";
  const isBriefsTab   = tab === "briefs";
  const isWatchTab    = tab === "watch";

  return (
    <div className="orbis">
      <ClassificationStripe />
      <TopNav tab={tab} onTab={setTab} pendingCount={pendingQueue.length} />

      {isSourcesTab ? (
        /* ─── Sources / Validation view ─── */
        <div className="stage" style={{gridTemplateColumns:"340px 1fr 420px"}}>
          <aside className="rail rail-l">
            <PendingQueue
              items={pendingQueue}
              selectedId={selectedPending}
              onSelect={setSelectedPending} />
          </aside>

          <div className="map-pane">
            <WorldMap
              events={mergedEvents}
              selected={selected}
              onSelect={setSelected}
              theatre={t.theatre}
              showGraticule={t.showGraticule}
              showForecast={false}
              showDots={t.showDots} />
            <div className="hud-tl mono">
              <div>{hudCoords}</div>
              <div className="hud-sub">AI VALIDATION MODE</div>
              <div className="hud-sub">PIPELINE · {pendingQueue.length} VETTING · {publishedEvents.length} PUBLISHED · {rejectedLog.length} REJECTED</div>
              <div className="hud-sub" style={{color: liveStatus.state==="error" ? "#FF6B6B" : "var(--sextant-bright)"}}>
                GDELT · {liveLabel(liveStatus)}
              </div>
            </div>
            <div className="hud-br mono">
              <div>BUILD · ORBIS-7 · {new Date().toISOString().slice(0,10)}</div>
              <div className="hud-sub">A BLUME PRODUCT</div>
            </div>
          </div>

          <aside className="rail rail-r" style={{overflowY:"auto"}}>
            <div className="panel-head">
              <span className="panel-title">ai verification log</span>
              <span className="panel-meta mono">ADMIRALTY · STANAG 2511</span>
            </div>
            <VettingPanel event={selectedPendingEvent} />
            <RejectedLog items={rejectedLog} />
          </aside>
        </div>
      ) : (
        /* ─── Theatre view (default) ─── */
        <div className={
          "stage"
          + (leftHidden  ? " col-l-collapsed" : "")
          + (rightHidden ? " col-r-collapsed" : "")
        }>
          {(t.showWatch || t.showLead) && (
            <Rail side="l" collapsed={leftCollapsed} label="WATCH LIST"
                  onToggle={() => setLeftCollapsed(v => !v)}>
              {t.showLead  && <LeadCard lead={LEAD} />}
              {t.showWatch && <WatchList items={WATCHLIST} onSelectRegion={selectByRegion} />}
            </Rail>
          )}

          <div className="map-pane">
            <WorldMap
              events={mergedEvents}
              selected={selected}
              onSelect={setSelected}
              theatre={t.theatre}
              showGraticule={t.showGraticule}
              showForecast={t.showForecast}
              showDots={t.showDots} />

            <div className="hud-tl mono">
              <div>{hudCoords}</div>
              <div className="hud-sub">PROJECTION · EQUIRECTANGULAR</div>
              <div className="hud-sub">FOCUS · {selectedEvent ? selectedEvent.region.toUpperCase() : t.theatre.toUpperCase()}</div>
              <div className="hud-sub" style={{color: liveStatus.state==="error" ? "#FF6B6B" : "var(--sextant-bright)", cursor:"pointer"}}
                   onClick={refreshLive}
                   title={liveStatus.state==="error" ? liveStatus.error : "Click to refresh"}>
                GDELT · {liveLabel(liveStatus)} ⟳
              </div>
              <div className="hud-sub" style={{color:"var(--sextant-bright)"}}>
                AI PIPELINE · {pendingQueue.length} VETTING · {publishedEvents.length} LIVE
              </div>
            </div>
            <div className="hud-tr mono">
              <div>SOURCES · {mergedEvents.length} ON MAP</div>
              <div className="hud-sub">PENDING · {pendingQueue.length.toString().padStart(2,"0")}</div>
              <div className="hud-sub">A-GRADE · {mergedEvents.filter(e=>e.source[0]==="A").length.toString().padStart(2,"0")}</div>
              <div className="hud-sub">B-GRADE · {mergedEvents.filter(e=>e.source[0]==="B").length.toString().padStart(2,"0")}</div>
              <div className="hud-sub">C-GRADE · {mergedEvents.filter(e=>e.source[0]==="C").length.toString().padStart(2,"0")}</div>
              <div className="hud-sub">D-GRADE · {mergedEvents.filter(e=>e.source[0]==="D").length.toString().padStart(2,"0")}</div>
            </div>
            <div className="hud-bl mono">
              <div>FORECAST LAYER · BAYESIAN · v 4.2.1</div>
              <div className="hud-sub">PRIORS REBASELINED 0500Z</div>
            </div>
            <div className="hud-br mono">
              <div>BUILD · ORBIS-7 · {new Date().toISOString().slice(0,10)}</div>
              <div className="hud-sub">A BLUME PRODUCT</div>
            </div>
          </div>

          {t.showStream && (
            <Rail side="r" collapsed={rightCollapsed}
                  label={isForecastTab ? "FORECAST" : isBriefsTab ? "BRIEFS" : "EVENT STREAM"}
                  onToggle={() => setRightCollapsed(v => !v)}>
              {isForecastTab ? (
                <ForecastPanel items={WATCHLIST} />
              ) : isBriefsTab ? (
                <BriefsPanel />
              ) : (
                <>
                  {selectedEvent && <DetailCard event={selectedEvent} />}
                  <EventStream events={mergedEvents} selected={selected} onSelect={setSelected} />
                </>
              )}
            </Rail>
          )}
        </div>
      )}

      {!isSourcesTab && t.showTimeline && (
        <TimelineBar events={mergedEvents} selected={selected} onSelect={setSelected} />
      )}

      {isSourcesTab && (
        <div className="timeline" style={{borderTop:"1px solid var(--hairline)"}}>
          <div className="timeline-head mono">
            <span>AI VALIDATION PIPELINE · ADMIRALTY CODE (NATO STANAG 2511)</span>
            <span className="timeline-now">{pendingQueue.length} VETTING · {publishedEvents.length} PUBLISHED · {rejectedLog.length} REJECTED</span>
            <span>AUTO-PUBLISH ≥3/5 CHECKS + CRED ≤3</span>
          </div>
        </div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Map">
          <TweakSelect
            label="Theatre focus"
            value={t.theatre}
            onChange={v => setTweak("theatre", v)}
            options={[
              {value:"world",       label:"World"},
              {value:"indopacific", label:"Indo-Pacific"},
              {value:"eurasia",     label:"Eurasia"},
              {value:"red-sea",     label:"Red Sea · Hormuz"},
              {value:"americas",    label:"Americas"},
            ]} />
          <TweakRadio
            label="Land treatment"
            value={t.showDots ? "dots" : "outline"}
            onChange={v => setTweak("showDots", v === "dots")}
            options={[
              {value:"outline", label:"Outline"},
              {value:"dots",    label:"Dot grid"},
            ]} />
          <TweakToggle label="Forecast layer" value={t.showForecast}  onChange={v => setTweak("showForecast", v)} />
          <TweakToggle label="Graticule"      value={t.showGraticule} onChange={v => setTweak("showGraticule", v)} />
        </TweakSection>
        <TweakSection label="Panels">
          <TweakToggle label="Lead assessment" value={t.showLead}     onChange={v => setTweak("showLead", v)} />
          <TweakToggle label="Watch list"      value={t.showWatch}    onChange={v => setTweak("showWatch", v)} />
          <TweakToggle label="Event stream"    value={t.showStream}   onChange={v => setTweak("showStream", v)} />
          <TweakToggle label="Timeline"        value={t.showTimeline} onChange={v => setTweak("showTimeline", v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
